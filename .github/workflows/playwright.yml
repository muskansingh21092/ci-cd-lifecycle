name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ── JOB 1: Run only @smoke tagged tests FIRST ─────────────
  smoke:
    name: 🚀 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Smoke Tests
        run: npx playwright test --grep @smoke     # ← only runs @smoke tests

      - name: Upload Smoke Report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 30

  # ── JOB 2: Run only @regression tests AFTER smoke passes ──
  regression:
    name: 🔁 Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: smoke                  # ← waits for smoke to pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Regression Tests
        run: npx playwright test --grep @regression  # ← only runs @regression tests

      - name: Upload Regression Report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: regression-report
          path: playwright-report/
          retention-days: 30
